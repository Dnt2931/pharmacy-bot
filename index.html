<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>MediOrder — Pharmacy</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0b0f1a;
    --surface:   #131929;
    --card:      #1a2236;
    --border:    #253050;
    --accent:    #3b82f6;
    --accent2:   #06b6d4;
    --green:     #10b981;
    --yellow:    #f59e0b;
    --red:       #ef4444;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --radius:    14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── TOP BAR ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(11,15,26,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .logo-dot {
    width: 32px; height: 32px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .topbar h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
  .topbar p  { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .cart-btn {
    position: relative;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 14px;
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    transition: background .2s;
  }
  .cart-btn:active { background: var(--border); }
  .cart-badge {
    position: absolute; top: -4px; right: -4px;
    background: var(--accent);
    color: white; font-size: 10px; font-weight: 700;
    border-radius: 999px; min-width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    display: none;
  }

  /* ── TABS ── */
  .tabs {
    display: flex; gap: 8px;
    padding: 12px 16px 0;
    overflow-x: auto; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all .2s;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* ── SEARCH ── */
  .search-wrap { padding: 12px 16px; }
  .search-wrap input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 11px 16px 11px 42px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Sora', sans-serif;
    outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute; left: 28px;
    top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 16px; pointer-events: none;
  }
  .search-container { position: relative; }

  /* ── SECTION LABEL ── */
  .section-label {
    padding: 4px 16px 8px;
    font-size: 12px; font-weight: 600;
    color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
  }

  /* ── MEDICINE GRID ── */
  .medicine-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 0 16px 100px;
  }

  .med-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .med-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0; transition: opacity .2s;
  }
  .med-card:active, .med-card.selected {
    border-color: var(--accent);
    transform: scale(0.98);
  }
  .med-card.selected::before { opacity: 1; }

  .med-name {
    font-size: 13px; font-weight: 600;
    line-height: 1.3; margin-bottom: 4px;
  }
  .med-category {
    font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .med-price {
    font-size: 16px; font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }
  .med-unit { font-size: 10px; color: var(--muted); margin-left: 2px; }
  .med-profit {
    margin-top: 6px;
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(16,185,129,0.12);
    border: 1px solid rgba(16,185,129,0.25);
    border-radius: 6px;
    padding: 3px 7px;
    font-size: 11px; font-weight: 600;
    color: var(--green);
  }
  .stock-badge {
    position: absolute; top: 10px; right: 10px;
    font-size: 9px; font-weight: 600;
    padding: 2px 6px; border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
  }
  .stock-ok  { background: rgba(16,185,129,0.15); color: var(--green); }
  .stock-low { background: rgba(245,158,11,0.15);  color: var(--yellow); }
  .stock-out { background: rgba(239,68,68,0.15);   color: var(--red); }

  .qty-control {
    display: flex; align-items: center; gap: 6px; margin-top: 10px;
  }
  .qty-btn {
    width: 26px; height: 26px; border-radius: 8px;
    background: var(--border); border: none; color: white;
    font-size: 16px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: background .15s;
  }
  .qty-btn:active { background: var(--accent); }
  .qty-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 600; min-width: 20px; text-align: center;
  }

  /* ── EMPTY ── */
  .empty {
    grid-column: 1/-1;
    text-align: center; padding: 40px 20px;
    color: var(--muted); font-size: 14px;
  }
  .empty .emoji { font-size: 40px; display: block; margin-bottom: 10px; }

  /* ── CART SHEET ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200; backdrop-filter: blur(4px);
  }
  .overlay.open { display: block; }

  .cart-sheet {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    z-index: 201;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.32,.72,0,1);
    max-height: 85vh;
    display: flex; flex-direction: column;
  }
  .cart-sheet.open { transform: translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border); border-radius: 999px;
    margin: 12px auto 0;
  }
  .sheet-title {
    padding: 16px 20px 12px;
    font-size: 16px; font-weight: 700;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sheet-body {
    overflow-y: auto; flex: 1;
    padding: 12px 20px;
  }

  .cart-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .cart-item-name { font-size: 13px; font-weight: 600; }
  .cart-item-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .cart-item-price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 700; color: var(--accent);
  }

  .cart-total {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .cart-total span { font-size: 14px; color: var(--muted); }
  .cart-total strong {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px; font-weight: 700; color: var(--accent);
  }

  /* ── DOCTOR FORM ── */
  .form-section { padding: 0 20px 16px; }
  .form-section h3 { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group { margin-bottom: 10px; }
  .form-group input, .form-group textarea {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Sora', sans-serif;
    outline: none;
    transition: border-color .2s;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group input::placeholder, .form-group textarea::placeholder { color: var(--muted); }
  .form-group textarea { resize: none; height: 60px; }

  .order-btn {
    width: calc(100% - 40px);
    margin: 0 20px 20px;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 14px;
    color: white; font-size: 15px; font-weight: 700;
    font-family: 'Sora', sans-serif;
    cursor: pointer;
    transition: opacity .2s, transform .15s;
    letter-spacing: 0.3px;
  }
  .order-btn:active { transform: scale(0.98); opacity: 0.9; }
  .order-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── SUCCESS ── */
  .success-screen {
    display: none;
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 300;
    flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 40px;
  }
  .success-screen.show { display: flex; }
  .success-icon {
    width: 80px; height: 80px;
    background: rgba(16,185,129,0.12);
    border: 2px solid var(--green);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; margin-bottom: 24px;
    animation: pop .4s cubic-bezier(.32,.72,0,1);
  }
  @keyframes pop {
    0%   { transform: scale(0); }
    80%  { transform: scale(1.1); }
    100% { transform: scale(1); }
  }
  .success-screen h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .success-screen p  { font-size: 14px; color: var(--muted); line-height: 1.6; }
  .success-order-id {
    margin-top: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--accent);
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 8px; padding: 8px 16px;
  }
  .back-btn {
    margin-top: 28px;
    padding: 12px 32px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text); font-size: 14px; font-weight: 600;
    font-family: 'Sora', sans-serif;
    cursor: pointer;
  }

  /* ── LOADING ── */
  .loading {
    display: none;
    position: fixed; inset: 0;
    background: rgba(11,15,26,0.85);
    z-index: 400;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  .loading.show { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 14px; color: var(--muted); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 18px;
    font-size: 13px; font-weight: 500;
    opacity: 0; transition: all .3s; z-index: 500;
    white-space: nowrap; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-dot">💊</div>
    <div>
      <h1>MediOrder</h1>
      <p id="doctor-name">Loading...</p>
    </div>
  </div>
  <button class="cart-btn" onclick="openCart()">
    🛒
    <span class="cart-badge" id="cart-badge">0</span>
  </button>
</div>

<!-- CATEGORY TABS -->
<div class="tabs" id="tabs"></div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-container">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Search medicines..." id="search-input" oninput="filterMeds()"/>
  </div>
</div>

<div class="section-label" id="section-label">ALL MEDICINES</div>

<!-- MEDICINE GRID -->
<div class="medicine-grid" id="med-grid"></div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>

<!-- CART SHEET -->
<div class="cart-sheet" id="cart-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">
    <span>🛒 Your Cart</span>
    <span id="cart-count-label" style="font-size:13px;color:var(--muted);font-weight:400;"></span>
  </div>
  <div class="sheet-body" id="cart-body"></div>
  <div class="cart-total">
    <span>Total Amount</span>
    <strong id="cart-total-price">Rs. 0</strong>
  </div>

  <div class="form-section">
    <h3>Your Details</h3>
    <div class="form-group">
      <input type="text" id="doc-name" placeholder="Full Name (Dr. ...)" required/>
    </div>
    <div class="form-group">
      <input type="tel" id="doc-phone" placeholder="Phone Number"/>
    </div>
    <div class="form-group">
      <textarea id="doc-notes" placeholder="Special instructions (optional)"></textarea>
    </div>
  </div>

  <button class="order-btn" onclick="placeOrder()" id="order-btn">Place Order →</button>
</div>

<!-- SUCCESS SCREEN -->
<div class="success-screen" id="success-screen">
  <div class="success-icon">✅</div>
  <h2>Order Placed!</h2>
  <p>Your order has been sent to the pharmacy.<br>They will contact you shortly.</p>
  <div class="success-order-id" id="success-order-id">Order #—</div>
  <button class="back-btn" onclick="resetApp()">← Back to Shop</button>
</div>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <p>Placing your order...</p>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const API = "http://192.168.8.137"; // Replace with your backend URL

// ── STATE ─────────────────────────────────────────────────
let medicines = [];
let cart = {};         // { med_id: quantity }
let activeCategory = "All";
let tgUser = null;

// ── INIT ──────────────────────────────────────────────────
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

tgUser = tg.initDataUnsafe?.user;
document.getElementById("doctor-name").textContent =
  tgUser ? `Dr. ${tgUser.first_name}` : "Doctor";

loadMedicines();

// ── LOAD MEDICINES ────────────────────────────────────────
async function loadMedicines() {
  try {
    const res = await fetch(`${API}/medicines`);
    medicines = await res.json();
    buildTabs();
    renderGrid();
  } catch(e) {
    document.getElementById("med-grid").innerHTML =
      `<div class="empty"><span class="emoji">⚠️</span>Could not load medicines.<br>Please try again.</div>`;
  }
}

// ── BUILD CATEGORY TABS ───────────────────────────────────
function buildTabs() {
  const cats = ["All", ...new Set(medicines.map(m => m.category))];
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = cats.map(c =>
    `<button class="tab ${c === 'All' ? 'active' : ''}" onclick="setCategory('${c}')">${c}</button>`
  ).join("");
}

function setCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.textContent === cat);
  });
  document.getElementById("section-label").textContent =
    cat === "All" ? "ALL MEDICINES" : cat.toUpperCase();
  renderGrid();
}

// ── RENDER GRID ───────────────────────────────────────────
function renderGrid() {
  const q = document.getElementById("search-input").value.toLowerCase();
  let list = medicines.filter(m => {
    const matchCat = activeCategory === "All" || m.category === activeCategory;
    const matchQ   = !q || m.name.toLowerCase().includes(q) || m.category.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  const grid = document.getElementById("med-grid");

  if (!list.length) {
    grid.innerHTML = `<div class="empty"><span class="emoji">🔍</span>No medicines found.</div>`;
    return;
  }

  grid.innerHTML = list.map(m => {
    const qty = cart[m.id] || 0;
    const stockClass = m.stock > 10 ? "stock-ok" : m.stock > 0 ? "stock-low" : "stock-out";
    const stockLabel = m.stock > 10 ? "In Stock" : m.stock > 0 ? `${m.stock} left` : "Out";
    const isOut = m.stock === 0;

    return `
    <div class="med-card ${qty > 0 ? 'selected' : ''}" id="card-${m.id}">
      <span class="stock-badge ${stockClass}">${stockLabel}</span>
      <div class="med-name">${m.name}</div>
      <div class="med-category">${m.category}</div>
      <div>
        <span class="med-price">Rs.${m.price.toLocaleString()}</span>
        <span class="med-unit">/${m.unit}</span>
      </div>
      ${m.profit_margin > 0
        ? `<div class="med-profit">📈 ${m.profit_margin}% profit</div>`
        : ""}
      ${!isOut ? `
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty(${m.id},-1,event)">−</button>
        <span class="qty-num" id="qty-${m.id}">${qty}</span>
        <button class="qty-btn" onclick="changeQty(${m.id},+1,event)">+</button>
      </div>` : `<div style="margin-top:10px;font-size:11px;color:var(--red);">Not available</div>`}
    </div>`;
  }).join("");
}

function filterMeds() { renderGrid(); }

// ── CART LOGIC ────────────────────────────────────────────
function changeQty(id, delta, e) {
  e.stopPropagation();
  const med = medicines.find(m => m.id === id);
  if (!med) return;

  cart[id] = Math.max(0, Math.min((cart[id] || 0) + delta, med.stock));
  if (cart[id] === 0) delete cart[id];

  // Update qty display
  const qtyEl = document.getElementById(`qty-${id}`);
  if (qtyEl) qtyEl.textContent = cart[id] || 0;

  // Update card selection
  const card = document.getElementById(`card-${id}`);
  if (card) card.classList.toggle("selected", !!cart[id]);

  updateCartBadge();
  if (delta > 0 && cart[id] === 1) showToast(`${med.name} added to cart`);
}

function updateCartBadge() {
  const total = Object.values(cart).reduce((a, b) => a + b, 0);
  const badge = document.getElementById("cart-badge");
  badge.style.display = total > 0 ? "flex" : "none";
  badge.textContent = total;
}

function cartTotal() {
  return Object.entries(cart).reduce((sum, [id, qty]) => {
    const med = medicines.find(m => m.id == id);
    return sum + (med ? med.price * qty : 0);
  }, 0);
}

// ── CART SHEET ────────────────────────────────────────────
function openCart() {
  if (Object.keys(cart).length === 0) {
    showToast("Your cart is empty 🛒");
    return;
  }
  renderCartSheet();
  document.getElementById("overlay").classList.add("open");
  document.getElementById("cart-sheet").classList.add("open");

  // Pre-fill name from Telegram
  if (tgUser && !document.getElementById("doc-name").value) {
    document.getElementById("doc-name").value = `${tgUser.first_name} ${tgUser.last_name || ""}`.trim();
  }
}

function closeCart() {
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("cart-sheet").classList.remove("open");
}

function renderCartSheet() {
  const items = Object.entries(cart);
  const countLabel = `${items.length} item${items.length > 1 ? 's' : ''}`;
  document.getElementById("cart-count-label").textContent = countLabel;

  const body = document.getElementById("cart-body");
  body.innerHTML = items.map(([id, qty]) => {
    const med = medicines.find(m => m.id == id);
    if (!med) return "";
    return `
    <div class="cart-item">
      <div>
        <div class="cart-item-name">${med.name}</div>
        <div class="cart-item-sub">${qty} ${med.unit} × Rs.${med.price.toLocaleString()}</div>
      </div>
      <div class="cart-item-price">Rs.${(med.price * qty).toLocaleString()}</div>
    </div>`;
  }).join("");

  document.getElementById("cart-total-price").textContent =
    `Rs. ${cartTotal().toLocaleString()}`;
}

// ── PLACE ORDER ───────────────────────────────────────────
async function placeOrder() {
  const name  = document.getElementById("doc-name").value.trim();
  const phone = document.getElementById("doc-phone").value.trim();
  const notes = document.getElementById("doc-notes").value.trim();

  if (!name) { showToast("Please enter your name ✍️"); return; }
  if (Object.keys(cart).length === 0) { showToast("Cart is empty!"); return; }

  const btn = document.getElementById("order-btn");
  btn.disabled = true;
  document.getElementById("loading").classList.add("show");

  const payload = {
    doctor_telegram_id: tgUser ? String(tgUser.id) : "unknown",
    doctor_name: name,
    doctor_phone: phone,
    notes: notes,
    items: Object.entries(cart).map(([id, qty]) => ({
      medicine_id: parseInt(id),
      quantity: qty
    }))
  };

  try {
    const res = await fetch(`${API}/orders`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || "Order failed");
    }

    const order = await res.json();
    document.getElementById("loading").classList.remove("show");
    document.getElementById("success-order-id").textContent = `Order #${order.id}`;
    document.getElementById("success-screen").classList.add("show");
    closeCart();

  } catch(e) {
    document.getElementById("loading").classList.remove("show");
    showToast(`❌ ${e.message}`);
    btn.disabled = false;
  }
}

// ── RESET ─────────────────────────────────────────────────
function resetApp() {
  cart = {};
  document.getElementById("success-screen").classList.remove("show");
  document.getElementById("doc-name").value = "";
  document.getElementById("doc-phone").value = "";
  document.getElementById("doc-notes").value = "";
  document.getElementById("order-btn").disabled = false;
  updateCartBadge();
  loadMedicines();
}

// ── TOAST ─────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
</script>
</body>
</html>
